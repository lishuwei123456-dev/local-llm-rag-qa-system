name: test

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install test dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
